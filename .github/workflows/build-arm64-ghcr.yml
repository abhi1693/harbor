name: Build ARM64 Harbor Images

on:
  workflow_dispatch:
    inputs:
      harbor_tag:
        description: "Upstream Harbor tag to build, for example v2.15.1. Leave empty for latest stable."
        required: false
        type: string
      publish_latest:
        description: "Also maintain latest-arm64 tags."
        required: false
        default: true
        type: boolean
      force_rebuild:
        description: "Build even if ARM64 tags already exist."
        required: false
        default: false
        type: boolean
  schedule:
    # GitHub cron cannot express an exact rolling 14-day interval. This runs
    # twice a month, which is close enough for release polling.
    - cron: "23 4 1,15 * *"

permissions:
  contents: read
  packages: write

concurrency:
  group: harbor-arm64-${{ github.event.inputs.harbor_tag || 'latest' }}
  cancel-in-progress: false

env:
  IMAGE_NAMESPACE: ghcr.io/abhi1693
  UPSTREAM_REPO: https://github.com/goharbor/harbor.git

jobs:
  resolve:
    name: Resolve tag and image plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      harbor_tag: ${{ steps.tag.outputs.harbor_tag }}
      upstream_sha: ${{ steps.tag.outputs.upstream_sha }}
      build: ${{ steps.plan.outputs.build }}
      alias_missing: ${{ steps.plan.outputs.alias_missing }}
      verify: ${{ steps.plan.outputs.verify }}
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
      alias_matrix: ${{ steps.plan.outputs.alias_matrix }}
      all_images: ${{ steps.plan.outputs.all_images }}

    steps:
      - name: Checkout automation
        uses: actions/checkout@v6.0.2

      - name: Resolve upstream tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ github.event.inputs.harbor_tag || '' }}"
          if [ -z "$tag" ]; then
            tag="$(git ls-remote --tags "$UPSTREAM_REPO" 'refs/tags/v*' \
              | awk '{print $2}' \
              | sed -E 's#refs/tags/##; s/\^\{\}//' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1)"
          fi

          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid Harbor tag: $tag" >&2
            exit 1
          fi

          rm -rf /tmp/harbor-src
          git clone --depth=1 --branch "$tag" "$UPSTREAM_REPO" /tmp/harbor-src
          upstream_sha="$(git -C /tmp/harbor-src rev-parse --short=8 HEAD)"

          echo "harbor_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine missing images
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          force_rebuild="${{ github.event.inputs.force_rebuild || 'false' }}"
          publish_latest="${{ github.event.inputs.publish_latest || 'true' }}"
          harbor_tag="${{ steps.tag.outputs.harbor_tag }}"

          plan_json="$(scripts/build-ghcr-arm64.sh plan /tmp/harbor-src "$harbor_tag" "$force_rebuild" "$publish_latest")"
          build="$(jq -r '.build' <<<"$plan_json")"
          alias_missing="$(jq -r '.alias_missing' <<<"$plan_json")"

          build_matrix="$(jq -c 'if (.build_matrix | length) == 0 then [{image: "noop", target: "noop"}] else .build_matrix end' <<<"$plan_json")"
          alias_matrix="$(jq -c 'if (.alias_images | length) == 0 then [{image: "noop"}] else [.alias_images[] | {image: .}] end' <<<"$plan_json")"
          all_images="$(jq -c '.all_images' <<<"$plan_json")"

          echo "build=${build}" >> "$GITHUB_OUTPUT"
          echo "alias_missing=${alias_missing}" >> "$GITHUB_OUTPUT"
          if [ "$build" = "true" ] || [ "$alias_missing" = "true" ]; then
            echo "verify=true" >> "$GITHUB_OUTPUT"
          else
            echo "verify=false" >> "$GITHUB_OUTPUT"
          fi
          echo "build_matrix=${build_matrix}" >> "$GITHUB_OUTPUT"
          echo "alias_matrix=${alias_matrix}" >> "$GITHUB_OUTPUT"
          echo "all_images=${all_images}" >> "$GITHUB_OUTPUT"

          echo "Build matrix: ${build_matrix}"
          echo "Alias matrix: ${alias_matrix}"

  prepare-source:
    name: Compile upstream source
    needs: resolve
    if: needs.resolve.outputs.build == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - name: Checkout automation
        uses: actions/checkout@v6.0.2

      - name: Check out upstream Harbor tag
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/harbor-src
          git clone --depth=1 --branch "${{ needs.resolve.outputs.harbor_tag }}" "$UPSTREAM_REPO" /tmp/harbor-src

      - name: Compile Harbor once
        env:
          GIT_COMMIT: ${{ needs.resolve.outputs.upstream_sha }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-ghcr-arm64.sh prepare-source /tmp/harbor-src "${{ needs.resolve.outputs.harbor_tag }}"

      - name: Package prepared source
        shell: bash
        run: |
          set -euo pipefail
          tar -C /tmp -czf "$RUNNER_TEMP/harbor-source.tgz" harbor-src

      - name: Upload prepared source
        uses: actions/upload-artifact@v7.0.1
        with:
          name: harbor-source-${{ needs.resolve.outputs.harbor_tag }}
          path: ${{ runner.temp }}/harbor-source.tgz
          retention-days: 1

  build-component:
    name: Build ${{ matrix.image }}
    needs:
      - resolve
      - prepare-source
    if: needs.resolve.outputs.build == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        include: ${{ fromJson(needs.resolve.outputs.build_matrix) }}

    steps:
      - name: Checkout automation
        uses: actions/checkout@v6.0.2

      - name: Download prepared source
        uses: actions/download-artifact@v8.0.1
        with:
          name: harbor-source-${{ needs.resolve.outputs.harbor_tag }}
          path: ${{ runner.temp }}/harbor-source

      - name: Extract prepared source
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf "$RUNNER_TEMP/harbor-source/harbor-source.tgz" -C /tmp

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish component
        env:
          GIT_COMMIT: ${{ needs.resolve.outputs.upstream_sha }}
          HARBOR_TAG: ${{ needs.resolve.outputs.harbor_tag }}
          PUBLISH_LATEST: ${{ github.event.inputs.publish_latest || 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-ghcr-arm64.sh build-component \
            /tmp/harbor-src \
            "$HARBOR_TAG" \
            "${{ matrix.image }}" \
            "${{ matrix.target }}"

  maintain-aliases:
    name: Maintain aliases for ${{ matrix.image }}
    needs: resolve
    if: needs.resolve.outputs.alias_missing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        include: ${{ fromJson(needs.resolve.outputs.alias_matrix) }}

    steps:
      - name: Checkout automation
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create missing aliases
        env:
          HARBOR_TAG: ${{ needs.resolve.outputs.harbor_tag }}
          PUBLISH_LATEST: ${{ github.event.inputs.publish_latest || 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-ghcr-arm64.sh maintain-aliases "$HARBOR_TAG" "${{ matrix.image }}"

  verify:
    name: Verify ARM64 manifests
    needs:
      - resolve
      - prepare-source
      - build-component
      - maintain-aliases
    if: >-
      always() &&
      needs.resolve.outputs.verify == 'true' &&
      needs.prepare-source.result != 'failure' &&
      needs.prepare-source.result != 'cancelled' &&
      needs.build-component.result != 'failure' &&
      needs.build-component.result != 'cancelled' &&
      needs.maintain-aliases.result != 'failure' &&
      needs.maintain-aliases.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify every expected image
        shell: bash
        run: |
          set -euo pipefail

          harbor_tag="${{ needs.resolve.outputs.harbor_tag }}"
          images='${{ needs.resolve.outputs.all_images }}'

          jq -r '.[]' <<<"$images" | while read -r image; do
            ref="${IMAGE_NAMESPACE}/${image}:${harbor_tag}"
            echo "Verifying ${ref}"
            docker manifest inspect -v "$ref" | jq -e '
              if type == "array" then
                any(.[]; .Descriptor.platform.os == "linux" and .Descriptor.platform.architecture == "arm64")
              else
                .Descriptor.platform.os == "linux" and .Descriptor.platform.architecture == "arm64"
              end
            ' >/dev/null
          done

  report-skipped:
    name: Report skipped build
    needs: resolve
    if: needs.resolve.outputs.build != 'true' && needs.resolve.outputs.alias_missing != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped build
        run: echo "All ARM64 images and aliases already exist for ${{ needs.resolve.outputs.harbor_tag }}."
